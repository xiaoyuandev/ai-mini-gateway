name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release asset
        env:
          BINARY_NAME: ai-mini-gateway
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi

          asset_base="${BINARY_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          asset_dir="dist/${asset_base}"
          mkdir -p "${asset_dir}"

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA::7}" \
            -o "${asset_dir}/${BINARY_NAME}${ext}" \
            ./cmd/gateway

          cp README.md "${asset_dir}/README.md"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd dist
              zip -r "${asset_base}.zip" "${asset_base}"
            )
          else
            tar -C dist -czf "dist/${asset_base}.tar.gz" "${asset_base}"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
